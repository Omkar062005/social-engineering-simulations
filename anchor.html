<!DOCTYPE html>
<html>
<head>
<title>Secure Portal Login</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:35px;
width:320px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

.login-box h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#667eea;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#4c5bd4;
}

.warning{
font-size:12px;
color:red;
margin-top:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Company Login Portal</h2>

<form>

<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>

<button>Login</button>

</form>

<p class="warning">Security Awareness Simulation Page</p>

</div>

</body>
</html>
